# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: caep-assurance-level-change
description: Transmits a Continuous Access Evaluation Protocol (CAEP) Assurance Level Change event as a Security Event Token (SET) to a specified endpoint

inputs:
  subject:
    type: text
    description: Subject identifier JSON (e.g., {"format":"email","email":"user@example.com"})
    required: true
    validation:
      min: 1
      max: 2000

  audience:
    type: text
    description: Intended recipient of the SET (e.g., https://customer.okta.com/)
    required: true
    validation:
      min: 1
      max: 500

  namespace:
    type: text
    description: Assurance level namespace (RFC8176, RFC6711, ISO-IEC-29115, NIST-IAL, NIST-AAL, NIST-FAL)
    required: true
    validation:
      enum:
        [
          "RFC8176",
          "RFC6711",
          "ISO-IEC-29115",
          "NIST-IAL",
          "NIST-AAL",
          "NIST-FAL",
        ]

  current_level:
    type: text
    description: Current assurance level value
    required: true
    validation:
      min: 1
      max: 100

  previous_level:
    type: text
    description: Previous assurance level value (optional)
    required: false
    validation:
      min: 1
      max: 100

  change_direction:
    type: text
    description: Direction of the assurance level change (increase or decrease)
    required: false
    validation:
      enum: ["increase", "decrease"]

  initiating_entity:
    type: text
    description: Entity that initiated the assurance level change (optional)
    required: false
    validation:
      max: 100

  reason_admin:
    type: text
    description: Admin-readable reason for the change (JSON for i18n or plain string)
    required: false
    validation:
      max: 1000

  reason_user:
    type: text
    description: User-readable reason for the change (JSON for i18n or plain string)
    required: false
    validation:
      max: 1000

  address:
    type: text
    description: Optional destination URL override (defaults to ADDRESS environment variable)
    required: false
    validation:
      min: 1
      max: 100

outputs:
  status:
    type: text
    description: Transmission status ('success' or 'failed')

  statusCode:
    type: number
    description: HTTP response status code

  body:
    type: text
    description: HTTP response body

  retryable:
    type: boolean
    description: Whether the error is retryable (for failed requests)

environment:
  ADDRESS:
    type: text
    description: Base URL for the API
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUDIENCE:
    type: text
    description: OAuth2 client credentials audience
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUTH_STYLE:
    type: text
    description: OAuth2 client credentials auth style
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID:
    type: text
    description: OAuth2 client credentials client ID
    required: false
  OAUTH2_CLIENT_CREDENTIALS_SCOPE:
    type: text
    description: OAuth2 client credentials scope
    required: false
  OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL:
    type: text
    description: OAuth2 client credentials token URL
    required: false

secrets:
  BEARER_AUTH_TOKEN:
    type: text
    description: Bearer auth token
    required: false
  BASIC_USERNAME:
    type: text
    description: Basic auth username
    required: false
  BASIC_PASSWORD:
    type: text
    description: Basic auth password
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET:
    type: text
    description: OAuth2 client secret
    required: false
  OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN:
    type: text
    description: OAuth2 authorization code access token
    required: false

optional_one_of:
  - ["secrets.BEARER_AUTH_TOKEN"]
  - ["secrets.BASIC_USERNAME", "secrets.BASIC_PASSWORD"]
  - [
      "secrets.OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET",
      "environment.OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID",
      "environment.OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL",
    ]
  - ["secrets.OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN"]
